version: '3.8'

services:
  testrails-backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: testrails-backend
    restart: unless-stopped
    env_file:
      - .env
    volumes:
      - testrails-uploads:/app/uploads
      - testrails-scans:/app/scans
      - /home/clawdbot/.ssh/id_ed25519:/tmp/host_ssh_key:ro
    networks:
      - testrails-network
    healthcheck:
      test: ["CMD", "node", "-e", "require('http').get('http://localhost:3000/health', (r) => {process.exit(r.statusCode === 200 ? 0 : 1)})"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 40s

  testrails-frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: testrails-frontend
    restart: unless-stopped
    ports:
      - "3002:80"
    networks:
      - testrails-network
    depends_on:
      - testrails-backend

volumes:
  testrails-uploads:
    name: testrails-uploads
  testrails-scans:
    driver: local

networks:
  testrails-network:
    name: workspace_testrails-network
    external: true
